<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ein elastisches Seilspiel mit p5.js und Matter.js."
    />
    <title>Elastic Orbit</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      // Wird die Seite in einem iframe angezeigt (z.B. im Portfolio-Karussell),
      // bekommt <html> die Klasse "embedded". Darüber blenden wir in style.css
      // das Seitenpanel aus, damit exakt der 960x960 Canvas übrig bleibt und
      // sauber in die Uhren-PNG passt. Läuft VOR dem ersten Rendern, damit es
      // keinen sichtbaren "Sprung" gibt.
      if (window.self !== window.top) {
        document.documentElement.classList.add("embedded");
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.9/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  </head>
  <body>
    <main>
      <section class="game-shell" aria-label="Elastic Orbit">
        <div class="canvas-frame">
          <div id="canvas-container"></div>
        </div>

        <aside class="side-panel" aria-label="Spielsteuerung">
          <div class="score-card" aria-live="polite">
            <span>Punkte</span>
            <strong id="score">00</strong>
          </div>

          <div class="wave-card">
            <span>Bälle im Feld</span>
            <strong id="field-count">1 Ball</strong>
            <small id="cycle-time">Fall in 60 Sekunden</small>
          </div>

          <button id="reset-button" type="button">Neustart</button>

          <div id="parameters" class="parameters" aria-label="Parameter">
            <div class="parameter-heading">
              <span>Parameter</span>
            </div>

            <label>
              <span>Schwerkraft <output id="gravity-value">0.00</output></span>
              <input id="gravity-control" type="range" min="0" max="0.16" step="0.01" value="0" />
            </label>
            <label>
              <span>Seilspannung <output id="rope-value">0.58</output></span>
              <input id="rope-control" type="range" min="0.25" max="0.9" step="0.01" value="0.58" />
            </label>
            <label>
              <span>Seile nach außen <output id="spread-value">100 px</output></span>
              <input id="spread-control" type="range" min="0" max="170" step="5" value="100" />
            </label>
            <label>
              <span>Zug ins Seil <output id="pull-value">1.00</output></span>
              <input id="pull-control" type="range" min="0.3" max="2.2" step="0.05" value="1" />
            </label>
            <label>
              <span>Schleuderkraft <output id="sling-value">1.20</output></span>
              <input id="sling-control" type="range" min="0.4" max="1.8" step="0.05" value="1.2" />
            </label>
            <label>
              <span>Punktbewegung <output id="points-value">1.70</output></span>
              <input id="points-control" type="range" min="0.4" max="3" step="0.05" value="1.7" />
            </label>
          </div>
        </aside>
      </section>
    </main>

    <script src="sketch.js"></script>
  </body>
</html>
