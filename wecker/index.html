<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wecker Workshop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css?v=6" />
</head>

<body>

  <div class="site-header">
    Wecker Workshop
  </div>

  <div class="carousel-viewport" id="viewport">

    <button
      class="nav-arrow nav-arrow--left"
      id="prevBtn"
      aria-label="Vorheriger Wecker">
      &#8249;
    </button>

    <div class="carousel-track" id="track">
      <!-- Slides werden von script.js erzeugt -->
    </div>

    <button
      class="nav-arrow nav-arrow--right"
      id="nextBtn"
      aria-label="Nächster Wecker">
      &#8250;
    </button>

  </div>

  <div class="site-footer">

    <div class="site-footer__meta">
      <div>
        <strong>Kursname:</strong><br>
        Ident
      </div>

      <div>
        <strong>Betreuende:</strong><br>
        Selina Dick<br>
        David Oswald<br>
        Marc Guntow<br>
        Michael Schuster
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="site-footer__logo">
      <img
        src="assets/logo.png"
        alt="Hochschule für Gestaltung Schwäbisch Gmünd">
    </div>

  </div>

  <!-- Medienliste -->
  <script src="videos.js?v=8"></script>

  <!-- Karussell -->
  <script src="script.js?v=9"></script>

</body>
</html>
